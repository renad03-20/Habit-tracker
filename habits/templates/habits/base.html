{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Momentum{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Handlee&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Playpen+Sans+Arabic:wght@100..800&family=Playwrite+AU+NSW&family=Saira:ital,wght@0,100..900;1,100..900&family=Signika+Negative:wght@300..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

  <style>
    /* ── Design Tokens ───────────────────────────────────────── */
    :root {
      --bg:        #080e0a;
      --surface:   #0e1a11;
      --surface2:  #162019;
      --border:    rgba(255,255,255,0.06);
      --text:      #e4f0e8;
      --muted:     #6a8c72;
      --accent:    #3ecf6e;   /* emerald green */
      --accent2:   #a3e635;   /* lime highlight */
      --success:   #3ecf6e;
      --radius:    14px;
      --font-display: "Saira", sans-serif;
      --font-body:    "Saira", sans-serif;
    }

    /* ── Reset / Base ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Noise grain overlay ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: .4;
    }

    /* ── Subtle green grid ──────────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(62,207,110,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(62,207,110,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Navbar ─────────────────────────────────────────────── */
    .navbar-custom {
      background: rgba(8,14,10,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      position: sticky; top: 0; z-index: 1056;
    }
    .navbar-brand-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--text) !important;
      letter-spacing: -0.5px;
    }
    .navbar-brand-text span { color: var(--accent); }

    .nav-search {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .35rem .85rem;
      font-size: .85rem;
      width: 220px;
      outline: none;
      transition: border-color .2s;
    }
    .nav-search:focus { border-color: var(--accent); }
    .nav-search::placeholder { color: var(--muted); }

    .nav-icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s;
      font-size: 1rem;
      text-decoration: none;
    }
    .nav-icon-btn:hover { color: var(--text); border-color: var(--accent); }

    .nav-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem; color: #060e08;
      cursor: pointer; border: 2px solid var(--border);
      font-family: var(--font-display);
    }

    /* ── Page Wrapper ───────────────────────────────────────── */
    .page-wrapper {
      position: relative;
      min-height: calc(100vh - 64px);
    }

    /* ── Shared Card ────────────────────────────────────────── */
    .card-dark {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* ── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────── -->
<nav class="navbar-custom d-flex align-items-center gap-3">
  <!-- Logo -->
  <a href="{% url 'habits:dashboard' %}" class="navbar-brand-text text-decoration-none me-2">
    Mo<span>mentum</span>
  </a>

  <!-- Search -->
  <input class="nav-search d-none d-md-block" type="text" placeholder="Search habits…" />

  <div class="ms-auto d-flex align-items-center gap-2">
    <!-- Theme toggle -->
    <button class="nav-icon-btn" id="themeToggle" title="Toggle theme">🌙</button>

    <!-- Notifications placeholder -->
    <span class="nav-icon-btn">🔔</span>

    <!-- User avatar / dropdown -->
    <div class="dropdown">
      <div class="nav-avatar" data-bs-toggle="dropdown">
        {{ request.user.email|first|upper }}
      </div>
      <ul class="dropdown-menu dropdown-menu-end" style="background:var(--surface2);border:1px solid var(--border);min-width:160px;">
        <li><span class="dropdown-item-text text-muted small px-3 pt-2">{{ request.user.email }}</span></li>
        <li><hr class="dropdown-divider" style="border-color:var(--border);"></li>
        <li>
          <a class="dropdown-item" style="color:var(--text);" href="{% url 'accounts:logout' %}">Sign out</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Page Content ────────────────────────────────────────────── -->
<div class="page-wrapper">
  {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  /* Theme toggle */
  const themeBtn = document.getElementById('themeToggle');
  const root = document.documentElement;
  let dark = true;
  themeBtn?.addEventListener('click', () => {
    dark = !dark;
    themeBtn.textContent = dark ? '🌙' : '☀️';
    root.style.setProperty('--bg',       dark ? '#080e0a' : '#f0f5f1');
    root.style.setProperty('--surface',  dark ? '#0e1a11' : '#ffffff');
    root.style.setProperty('--surface2', dark ? '#162019' : '#e4f0e8');
    root.style.setProperty('--text',     dark ? '#e4f0e8' : '#0e1a11');
    root.style.setProperty('--muted',    dark ? '#6a8c72' : '#4a7a55');
    root.style.setProperty('--border',   dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)');
  });

  /* ── Modal backdrop safety net ──────────────────────────────── */
  document.addEventListener('hidden.bs.modal', () => {
    document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
    document.body.classList.remove('modal-open');
    document.body.style.removeProperty('overflow');
    document.body.style.removeProperty('padding-right');
  });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
